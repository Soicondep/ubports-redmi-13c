name: Build Ubuntu Touch for Redmi 13C
on:
  workflow_dispatch: # Cho phép anh bấm nút Build bằng tay từ điện thoại

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dọn dẹp bộ nhớ Server
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Cài đặt công cụ Build
        run: |
          sudo apt-get update
          sudo apt-get install -y git repo gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip python3 bc libssl-dev

      - name: Cấu hình Git
        run: |
          git config --global user.email "anhbao@example.com"
          git config --global user.name "Anh Bao Nam Dinh"

            - name: Đồng bộ nguồn Halium 13 và Device Tree
        run: |
          mkdir halium && cd halium
          # Tải công cụ repo riêng để không bị lỗi quyền ghi
          curl https://storage.googleapis.com/git-repo-downloads/repo > repo
          chmod a+x repo
          # Khởi tạo đúng nhánh Halium 13 cho anh Bảo
          ./repo init -u https://github.com/Halium/android -b halium-13.0 --depth=1
          # Kéo Device Tree của Redmi 13C về đúng chỗ
          git clone https://github.com/looppo-p/android_device_xiaomi_gale -b halium-13 device/xiaomi/gale
          # Bắt đầu tải code (Bước này lâu, anh cứ đi làm chén trà)
          ./repo sync -j$(nproc) --no-clone-bundle

      - name: Xây dựng Halium-boot
        run: |
          cd halium
          source build/envsetup.sh
          # Chọn cấu hình cho máy Gale (Redmi 13C)
          lunch halium_gale-userdebug
          # Ra lệnh cho server đúc file boot
          mka halium-boot
          

