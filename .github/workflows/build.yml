name: Build Ubuntu Touch for Redmi 13C
on:
  workflow_dispatch: # Cho phép anh bấm nút Build bằng tay từ điện thoại

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dọn dẹp bộ nhớ Server
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Cài đặt công cụ Build
        run: |
          sudo apt-get update
          sudo apt-get install -y git repo gnupg flex bison gperf build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip python3 bc libssl-dev

      - name: Cấu hình Git
        run: |
          git config --global user.email "anhbao@example.com"
          git config --global user.name "Anh Bao Nam Dinh"

      - name: Sync Source Halium (Ubuntu Touch)
        run: |
          mkdir halium && cd halium
          repo init -u https://github.com/Halium/android -b halium-11 --depth=1
          repo sync -j$(nproc) --no-clone-bundle

      - name: Build Halium-boot
        run: |
          cd halium
          # Lưu ý: Chỗ này cần link Device Tree của Redmi 13C 4G (Gale)
          # Anh sẽ cần thêm lệnh git clone cái Device Tree vào đây sau
          echo "Bắt đầu nhào nặn ROM cho anh Bảo..."
          # source build/envsetup.sh && lunch halium_gale-userdebug && mka halium-boot
